name: Gracefell QA

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build and playtest
        run: npm run qa

      - name: Upload playtest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gracefell-playtest
          path: /tmp/gracefell-qa
          if-no-files-found: ignore
